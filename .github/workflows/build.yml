name: Build

on:
  workflow_call:

jobs:
  app:
    name: App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: pnpm/action-setup@v5

      - name: Node
        uses: actions/setup-node@v6

        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
